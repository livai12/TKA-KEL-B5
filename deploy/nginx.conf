# ===========================================================================
# nginx.conf - Nginx Site Configuration for Order Processing Service
# Target: VM1 (1vCPU, 512MB RAM) - Load Balancer + Frontend
# ===========================================================================
# Place this file at: /etc/nginx/sites-available/orderservice
# Then symlink to:    /etc/nginx/sites-enabled/orderservice

# ---------------------------------------------------------------------------
# Upstream: Flask app servers running Gunicorn on port 5000
# Replace placeholder IPs with actual VM IPs before deploying!
# ---------------------------------------------------------------------------
upstream flask_backends {
    least_conn;                     # Route to server with fewest active connections
    keepalive 64;                   # Persistent connections to backends

    server APP_SERVER_1_IP:5000;    # VM2 - Flask App Server 1
    server APP_SERVER_2_IP:5000;    # VM3 - Flask App Server 2
    # server APP_SERVER_3_IP:5000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ------------------------------------------------------------------
    # Frontend - static files served from /var/www/frontend
    # ------------------------------------------------------------------
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ------------------------------------------------------------------
    # API Proxy - route backend requests to Flask upstream
    # ------------------------------------------------------------------

    # Common proxy settings (inherited by all proxy locations)
    # Using a named location or setting vars won't work cleanly in nginx,
    # so we repeat the proxy directives in each location block below.

    # Auth endpoints: /auth/register, /auth/login, /auth/me
    location /auth/ {
        proxy_pass http://flask_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Product endpoints: /products, /products/<id>
    location /products {
        proxy_pass http://flask_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Order endpoints: /orders, /orders/<id>, /orders/<id>/status
    location /orders {
        proxy_pass http://flask_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Order endpoints (singular): /order, /order/<id>
    location /order {
        proxy_pass http://flask_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Admin endpoints: /admin/users, /admin/stats, /admin/logs
    location /admin/ {
        proxy_pass http://flask_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;      # Admin stats aggregation may take longer

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;  # Larger buffers for stats responses
    }

    # Health check endpoint (also used for monitoring)
    location /health {
        proxy_pass http://flask_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        # No access logging for health checks to reduce log noise
        access_log off;
    }

    # ------------------------------------------------------------------
    # Nginx status page for monitoring (restrict to localhost)
    # ------------------------------------------------------------------
    location /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }

    # ------------------------------------------------------------------
    # Error pages
    # ------------------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
